<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartera de Activos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    section { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    h2 { font-size: 1rem; margin-bottom: 1rem; color: #555; text-transform: uppercase; letter-spacing: .05em; }
    .field { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; }
    label { font-size: .95rem; }
    input[type="number"] { width: 140px; padding: .35rem .5rem; border: 1px solid #ccc; border-radius: 4px; font-size: .95rem; }
    button { padding: .5rem 1.25rem; background: #2563eb; color: #fff; border: none; border-radius: 5px; font-size: .95rem; cursor: pointer; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .status-panel { display: flex; flex-direction: column; gap: .5rem; }
    .status-row { display: flex; align-items: center; gap: .75rem; font-size: 1rem; }
    #status-icon { font-size: 1.4rem; }
    #status-time { font-size: .82rem; color: #888; }
    #link-report { display: none; margin-top: .5rem; color: #2563eb; font-weight: 600; text-decoration: none; }
    #link-report:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Cartera de Activos</h1>

  <section>
    <h2>Parámetros</h2>
    <form id="run-form">
      <div class="field">
        <input type="checkbox" id="usar_liquidez" />
        <label for="usar_liquidez">¿Usar liquidez actual de IOL?</label>
      </div>
      <div class="field">
        <label for="aporte">Aporte externo ARS</label>
        <input type="number" id="aporte" value="0" min="0" step="1" />
      </div>
      <button type="submit" id="btn-run">Generar reporte</button>
    </form>
  </section>

  <section>
    <h2>Estado</h2>
    <div class="status-panel">
      <div class="status-row">
        <span id="status-icon">⚪</span>
        <span id="status-text">Listo para generar</span>
      </div>
      <span id="status-time"></span>
      <a id="link-report" href="/reports/real-report.html">Ver reporte →</a>
    </div>
  </section>

  <script>
    let _pollInterval = null;

    function renderStatus(data) {
      const icon = document.getElementById('status-icon');
      const text = document.getElementById('status-text');
      const time = document.getElementById('status-time');
      const link = document.getElementById('link-report');
      const btn  = document.getElementById('btn-run');

      const map = {
        idle:    { i: '⚪', t: 'Listo para generar', ts: '' },
        running: { i: '⏳', t: 'Corriendo...',        ts: data.started_at || '' },
        done:    { i: '✅', t: 'Reporte listo',       ts: data.finished_at || '' },
        error:   { i: '❌', t: (data.error || '').slice(0, 300), ts: data.finished_at || '' },
      };

      const s = map[data.status] || map.idle;
      icon.textContent = s.i;
      text.textContent = s.t;
      time.textContent = s.ts;
      link.style.display = data.status === 'done' ? 'block' : 'none';
      btn.disabled = data.status === 'running';
    }

    function startPolling() {
      if (_pollInterval !== null) {
        clearInterval(_pollInterval);
      }
      _pollInterval = setInterval(async () => {
        try {
          const res = await fetch('/status');
          const data = await res.json();
          renderStatus(data);
          if (data.status !== 'running') {
            clearInterval(_pollInterval);
            _pollInterval = null;
          }
        } catch (_) {}
      }, 2000);
    }

    async function submitForm(event) {
      event.preventDefault();
      const usar_liquidez_iol = document.getElementById('usar_liquidez').checked;
      const aporte_externo_ars = parseFloat(document.getElementById('aporte').value) || 0;
      document.getElementById('btn-run').disabled = true;

      const res = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usar_liquidez_iol, aporte_externo_ars }),
      });

      if (res.status === 409) {
        alert('Ya hay un reporte en progreso');
        document.getElementById('btn-run').disabled = false;
        return;
      }

      startPolling();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('run-form').addEventListener('submit', submitForm);
      try {
        const res = await fetch('/status');
        const data = await res.json();
        renderStatus(data);
        if (data.status === 'running') {
          startPolling();
        }
      } catch (_) {}
    });
  </script>
</body>
</html>
